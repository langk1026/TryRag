
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VECTOR_DB_PATH=/app/data/chromadb
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - LOG_FILE=/app/logs/app.log
      - TELEMETRY_ENABLED=true
      - TELEMETRY_SERVICE_NAME=tryrag-backend
      - TELEMETRY_OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - vector-data:/app/data
      - backend-logs:/app/logs
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    container_name: rag-cron
    env_file:
      - .env
    environment:
      - VECTOR_DB_PATH=/app/data/chromadb
      - LOG_FILE=/app/logs/cron.log
    volumes:
      - vector-data:/app/data
      - cron-logs:/app/logs
    networks:
      - rag-network
    depends_on:
      - backend
      - otel-collector
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: tryrag-otel-collector
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - rag-network
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: tryrag-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
    networks:
      - rag-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: tryrag-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - rag-network
    depends_on:
      - jaeger
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rag-frontend
    ports:
      - "3000:80"
    networks:
      - rag-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vector-data:
    driver: local
  backend-logs:
    driver: local
  cron-logs:
    driver: local
  grafana-data:
    driver: local

networks:
  rag-network:
    driver: bridge
