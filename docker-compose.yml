
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: rag-backend:latest
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - API_RELOAD=true
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - vector-data:/app/data
      - backend-logs:/app/logs
      - ./data/local_documents:/tmp/tryrag_documents
    networks:
      - rag-network
    depends_on:
      - otel-collector
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: tryrag-otel-collector
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - rag-network
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: tryrag-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "4319:4317"
    networks:
      - rag-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: tryrag-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - rag-network
    depends_on:
      - jaeger
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: rag-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - rag-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vector-data:
    driver: local
  backend-logs:
    driver: local
  cron-logs:
    driver: local
  grafana-data:
    driver: local

networks:
  rag-network:
    driver: bridge
